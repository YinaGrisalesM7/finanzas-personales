}

function saveCommentPopup(type, id) {
    const comment = document.getElementById('f-popup-comment').value.trim();
    if (type === 'expense') {
        const item = state.expenses.find(e => String(e.id) === String(id));
        if (item) item.comment = comment;
    } else {
        const item = state.savings.find(s => s.id === id);
        if (item) item.comment = comment;
    }
    save(); closeModal(); render();
}

function toggleChartCard(id) {
    const idx = chartFilterCards.indexOf(id);
    if (idx >= 0) chartFilterCards.splice(idx, 1);
    else chartFilterCards.push(id);
    render();
}

function toggleChartCat(cat) {
    const idx = chartFilterCats.indexOf(cat);
    if (idx >= 0) chartFilterCats.splice(idx, 1);
    else chartFilterCats.push(cat);
    render();
}

function showDonutTip(cat, amount, pct) {
    const el = document.getElementById('donut-center');
    if (el) { el.innerHTML = `<div class="donut-val">${amount}</div><div class="donut-lbl">${cat} · ${pct}</div>`; }
}

function hideDonutTip() {
    const el = document.getElementById('donut-center');
    if (!el) return;
    const tab = activeTab();
    if (!tab) return;
    const expenses = getExpensesForTab(tab.id);
    let cExpenses = expenses;
    if (chartFilterCards.length > 0) cExpenses = cExpenses.filter(e => chartFilterCards.includes(e.creditCard || 'efectivo'));
    if (chartFilterCats.length > 0) cExpenses = cExpenses.filter(e => chartFilterCats.includes(e.category || ''));
    const cTotal = cExpenses.reduce((s, e) => s + e.payAmount, 0);
    el.innerHTML = `<div class="donut-val">${fmt(cTotal)}</div><div class="donut-lbl">Total</div>`;
}

function toggleExpCardFilter(id) {
    const idx = expFilterCard.indexOf(id);
    if (idx >= 0) expFilterCard.splice(idx, 1);
    else expFilterCard.push(id);
    render();
}

function setExpSort(col) {
    if (expSortCol === col) { expSortDir = expSortDir === 'asc' ? 'desc' : 'asc'; }
    else { expSortCol = col; expSortDir = 'asc'; }
    render();
}

function applySortExp(arr) {
    if (!expSortCol) return arr;
    const sorted = [...arr];
    sorted.sort((a, b) => {
        let va, vb;
        switch (expSortCol) {
            case 'description': va = (a.description || '').toLowerCase(); vb = (b.description || '').toLowerCase(); break;
            case 'totalPrice': va = a.totalPrice || 0; vb = b.totalPrice || 0; break;
            case 'payPrice': va = a.payAmount || 0; vb = b.payAmount || 0; break;
            case 'category': va = (a.category || '').toLowerCase(); vb = (b.category || '').toLowerCase(); break;
            case 'creditCard':
                const ca = state.creditCards.find(c => c.id === a.creditCard);
                const cb = state.creditCards.find(c => c.id === b.creditCard);
                va = ca ? ca.name.toLowerCase() : 'efectivo'; vb = cb ? cb.name.toLowerCase() : 'efectivo'; break;
            case 'creationDate': va = a.creationDate || ''; vb = b.creationDate || ''; break;
            case 'paymentDate': va = a.paymentDate || ''; vb = b.paymentDate || ''; break;
            case 'paid': va = a.paid ? 1 : 0; vb = b.paid ? 1 : 0; break;
            case 'comment': va = (a.comment || '').toLowerCase(); vb = (b.comment || '').toLowerCase(); break;
            default: return 0;
        }
        if (va < vb) return expSortDir === 'asc' ? -1 : 1;
        if (va > vb) return expSortDir === 'asc' ? 1 : -1;
        return 0;
    });
    return sorted;
}

/** Lista de gastos del tab con filtros de UI y orden aplicados (misma lógica que la tabla). */
function filterExpensesList(expList) {
    let filtered = expList;
    if (expSearch) {
        const q = expSearch.toLowerCase();
        filtered = filtered.filter(e => (e.description || '').toLowerCase().includes(q) || (e.category || '').toLowerCase().includes(q) || (e.comment || '').toLowerCase().includes(q));
    }
    if (expFilterCard.length) filtered = filtered.filter(e => expFilterCard.includes('efectivo') ? (expFilterCard.includes(e.creditCard) || (!e.creditCard || e.creditCard === 'efectivo')) : expFilterCard.includes(e.creditCard));
    if (expFilterCat) filtered = filtered.filter(e => e.category === expFilterCat);
    if (expFilterPaid === 'paid') filtered = filtered.filter(e => e.paid);
    if (expFilterPaid === 'unpaid') filtered = filtered.filter(e => !e.paid);
    if (expFilterDateFrom) filtered = filtered.filter(e => (e.paymentDate || e.creationDate || '') >= expFilterDateFrom);
    if (expFilterDateTo) filtered = filtered.filter(e => (e.paymentDate || e.creationDate || '') <= expFilterDateTo);
    return applySortExp(filtered);
}

function toggleSelectExp(id) {
    const k = String(id);
    if (selectedExpenses.has(k)) selectedExpenses.delete(k);
    else selectedExpenses.add(k);
    render();
}

function toggleSelectAll() {
    const tab = activeTab();
    if (!tab) return;
    const filtered = filterExpensesList(getExpensesForTab(tab.id));
    const allSelected = filtered.length > 0 && filtered.every(e => selectedExpenses.has(String(e.id)));
    if (allSelected) { filtered.forEach(e => selectedExpenses.delete(String(e.id))); }
    else { filtered.forEach(e => selectedExpenses.add(String(e.id))); }
    render();
}

function duplicateSelectedExpenses() {
    const currentTab = activeTab();
    if (!currentTab) return;
    const n = filterExpensesList(getExpensesForTab(currentTab.id)).filter(e => selectedExpenses.has(String(e.id))).length;
    if (n === 0) {
        alert('Selecciona uno o más gastos con la casilla ✓ o usa “seleccionar todos” en la primera columna de la tabla.');
        return;
    }
    const others = state.tabs.filter(t => t.id !== currentTab.id);
    const tabOrder = [currentTab, ...others];
    openModal(`
        <div class="modal-header"><h3>📋 Duplicar ${n} gasto${n > 1 ? 's' : ''}</h3><button type="button" class="btn btn-icon btn-sm btn-ghost" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
            <div class="form-group"><label>📂 Pestaña destino (puede ser la misma en la que estás)</label>
                <select id="f-dup-tab" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.82rem">
                    ${tabOrder.map(t => `<option value="${t.id}" ${t.id === currentTab.id ? 'selected' : ''}>${t.id === currentTab.id ? '📌 Esta pestaña · ' : ''}${esc(t.name)}</option>`).join('')}
                </select>
            </div>
            <p style="font-size:0.76rem;color:var(--text-muted);line-height:1.45;margin-top:10px">Se crearán copias con nuevo ID, marcadas como no pagadas.</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-ghost btn-sm" onclick="closeModal()">Cancelar</button>
            <button type="button" class="btn btn-primary" onclick="confirmDuplicateSelected()">📋 Duplicar</button>
        </div>
    `);
}

function confirmDuplicateSelected() {
    const targetTabId = document.getElementById('f-dup-tab').value;
    if (!targetTabId) return;
    const tab = activeTab();
    if (!tab) return;
    const ids = filterExpensesList(getExpensesForTab(tab.id))
        .filter(e => selectedExpenses.has(String(e.id)))
        .map(e => String(e.id));
    if (ids.length === 0) {
        selectedExpenses.clear();
        closeModal();
        render();
        return;
    }
    for (const expId of ids) {
        const exp = state.expenses.find(e => String(e.id) === expId);
        if (exp) {
            state.expenses.push({ ...exp, id: uid(), tabId: targetTabId, paid: false });
        }
    }
    const targetTab = state.tabs.find(t => t.id === targetTabId);
    selectedExpenses.clear();
    if (targetTab && targetTabId !== tab.id) {
        activeTabId = targetTabId;
        navYear = targetTab.year;
    }
    save(); closeModal(); render();
}

/* ══════════ MODAL ══════════ */
function openModal(html) {
    document.getElementById('modal').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

/* ══════════ EXPORT / IMPORT ══════════ */
function exportData() {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `finanzas_${new Date().toISOString().split('T')[0]}.json`;
    a.click(); URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (data.expenses) {
                state = migrateState(data);
                activeTabId = state.tabs[0]?.id || '';
                save(); render();
            }
        } catch (_) { alert('Error al importar.'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

/* ══════════ INIT ══════════ */
if (!activeTabId && state.tabs.length) activeTabId = state.tabs[0].id;
initApp();
</script>
